<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <meta name="description"
      content="New Reality Interactive — a creative and technical studio exploring new forms of storytelling, design, and software." />
   <title>New Reality Interactive</title>
   <style>
      html,
      body {
         background-image: url('images/background.png');
         background-size: cover;
         background-position: center;
         background-attachment: fixed;
         margin: 0;
         padding: 0;
         height: 100%;
         font-family: 'Segoe UI', sans-serif;
         background-color: #0f0f0f;
         color: #eaeaea;
         display: flex;
         align-items: center;
         justify-content: center;
         text-align: center;
      }

      .container {
         max-width: 800px;
         padding: 2rem;
      }

      .logo {
         max-width: 300px;
         height: auto;
         margin-bottom: 1.5rem;
      }

      p {
         font-size: 1.2rem;
         color: #aaaaaa;
      }

      .tagline {
         margin-top: 1.5rem;
         font-style: italic;
         color: #888;
      }
   </style>
</head>

<body>
   <div class="container">
      <img src="images/logo.png" alt="New Reality Interactive Logo" class="logo" />
      <p>Building immersive experiences at the edge of story and technology.</p>
      <p class="tagline">A new creative studio — launching soon.</p>
   </div>
</body>

</html>
